<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOL Draft</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1ad4f5;--blue-dim:rgba(26,212,245,.1);
  --red:#f0364f;--red-dim:rgba(240,54,79,.1);
  --gold:#d4a843;--gold-lt:#f5ce6e;--gold-dim:rgba(212,168,67,.1);
  --bg:#080b0f;--surface:#0e1318;--surface2:#141a20;--border:#1e2830;--border2:#2a3540;
  --text:#e8edf2;--text2:#9aabb8;--text3:#4a6070;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
/* subtle grid texture */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(26,212,245,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(26,212,245,.015) 1px,transparent 1px);
  background-size:40px 40px;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(26,212,245,.04) 0%,transparent 70%);}

.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 24px;overflow:hidden}

header{text-align:center;margin-bottom:12px;flex-shrink:0}
header h1{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;color:#fff;letter-spacing:.35em;text-transform:uppercase;text-shadow:0 0 40px rgba(26,212,245,.3)}
header p{font-size:.7rem;color:var(--text3);letter-spacing:.18em;text-transform:uppercase;margin-top:2px}

.board{display:grid;grid-template-columns:1fr 240px 1fr;gap:18px;width:100%;max-width:1320px;flex:1;min-height:0;overflow:hidden}

/* TEAM COLUMNS */
.team-col{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.team-label{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:8px 14px;border-radius:4px;margin-bottom:8px;flex-shrink:0}
.team-label.blue{color:var(--blue);border-left:3px solid var(--blue);background:var(--blue-dim)}
.team-label.red{color:var(--red);border-right:3px solid var(--red);background:var(--red-dim);text-align:right}

.frames{display:flex;flex-direction:column;gap:5px;flex:1;min-height:0}

.champ-frame{flex:1;min-height:0;display:flex;flex-direction:row;align-items:center;gap:12px;padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);position:relative;transition:border-color .2s,box-shadow .2s}
.champ-frame.active{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.6),0 0 20px rgba(255,255,255,.1);background:var(--surface2)}
.champ-frame.filled{border-color:var(--border2)}
.champ-frame.filled.active{border-color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.6),0 0 20px rgba(255,255,255,.1)}

.pick-badge{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;color:var(--text3);flex-shrink:0;width:20px;text-align:center;letter-spacing:.04em}

.frame-img{height:100%;aspect-ratio:1/1;border-radius:4px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--border2);font-size:1.2rem;flex-shrink:0}
.frame-img img{width:100%;height:100%;object-fit:cover;object-position:top}

.frame-name{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;letter-spacing:.04em}
.frame-name.empty{color:var(--text3);font-size:.82rem;font-weight:400}

.red .champ-frame{flex-direction:row-reverse}
.red .frame-name{text-align:right}

/* CENTER */
.center{display:flex;flex-direction:column;align-items:stretch;gap:10px;padding-top:32px;min-height:0;overflow:hidden}

.vs{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;color:var(--border2);letter-spacing:.3em;flex-shrink:0;text-align:center;text-transform:uppercase}

.winbar-wrap{width:100%;flex-shrink:0}
.winbar-pcts{display:flex;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:.06em;margin-bottom:5px}
.b{color:var(--blue)}.r{color:var(--red)}
.winbar{height:5px;background:var(--red-dim);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.winbar-fill{height:100%;background:linear-gradient(90deg,var(--blue),rgba(26,212,245,.7));border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}

.draft-info{font-size:.78rem;color:var(--text3);letter-spacing:.08em;text-align:center;flex-shrink:0;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif}

.role-wrap{width:100%;flex-shrink:0}
.role-wrap label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;text-transform:uppercase;letter-spacing:.14em;color:var(--text3);margin-bottom:5px;text-align:center}
.role-sel{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:5px;padding:10px 14px;cursor:pointer;outline:none;transition:border-color .15s}
.role-sel:focus,.role-sel:hover{border-color:var(--gold);color:var(--gold-lt)}
.role-sel option{background:var(--surface2)}

.btn{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:12px 0;width:100%;border-radius:5px;border:1px solid;cursor:pointer;transition:all .15s;text-align:center;flex-shrink:0}
.btn-add{border-color:var(--blue);color:var(--blue);background:var(--blue-dim)}
.btn-add:hover{background:rgba(26,212,245,.18);box-shadow:0 0 20px rgba(26,212,245,.15)}
.btn-predict{border-color:var(--gold);color:var(--gold-lt);background:var(--gold-dim)}
.btn-predict:hover{background:rgba(212,168,67,.2);box-shadow:0 0 20px rgba(212,168,67,.15)}
.btn-reset{border-color:var(--border);color:var(--text3);background:transparent;font-size:.78rem;padding:7px 0}
.btn-reset:hover{border-color:var(--red);color:var(--red)}

/* RECO */
.reco{display:none;flex-direction:column;flex:1;min-height:0;background:var(--surface);border:1px solid var(--border2);border-radius:6px;overflow:hidden}
.reco.visible{display:flex}
.reco-header{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface2)}
.reco-title{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;font-weight:700}
.reco-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.1rem;line-height:1;padding:0 2px;transition:color .12s}
.reco-close:hover{color:var(--red)}
.reco-list{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.reco-list::-webkit-scrollbar{width:4px}
.reco-list::-webkit-scrollbar-track{background:transparent}
.reco-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.reco-item{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;flex-shrink:0}
.reco-item:last-child{border-bottom:none}
.reco-item:hover{background:var(--gold-dim)}
.reco-rank{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:700;color:var(--text3);width:22px;text-align:center;flex-shrink:0}
.reco-img{width:34px;height:34px;border-radius:3px;object-fit:cover;object-position:top;border:1px solid var(--border2);flex-shrink:0}
.reco-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:600;color:var(--text);letter-spacing:.04em}
.reco-prob{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;color:var(--blue);flex-shrink:0}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(5,8,12,.92);backdrop-filter:blur(8px);align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:min(700px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 28px 70px rgba(0,0,0,.9)}
.modal-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface2)}
.modal-head-title{font-family:'Barlow Condensed',sans-serif;color:#fff;font-size:1rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.5rem;cursor:pointer;line-height:1;transition:color .12s}
.modal-close:hover{color:var(--red)}
.search{width:100%;padding:12px 18px;background:var(--surface2);border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Barlow',sans-serif;font-size:1rem;outline:none;flex-shrink:0;transition:border-color .15s}
.search:focus{border-bottom-color:var(--gold)}
.search::placeholder{color:var(--text3)}
.champ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;padding:14px;overflow-y:auto;flex:1}
.champ-grid::-webkit-scrollbar{width:4px}
.champ-grid::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.champ-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:6px;border:1px solid transparent;cursor:pointer;transition:all .12s;background:rgba(255,255,255,.02)}
.champ-card:hover{border-color:var(--gold);background:var(--gold-dim);transform:translateY(-1px)}
.champ-card.used{opacity:.12;pointer-events:none}
.champ-card img{width:58px;height:58px;border-radius:5px;object-fit:cover;object-position:top;border:1px solid var(--border)}
.champ-card span{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;text-align:center;color:var(--text2);max-width:82px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.03em}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--gold);color:var(--gold-lt);font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.08em;padding:9px 20px;border-radius:5px;z-index:200;opacity:0;transition:all .3s;pointer-events:none;text-transform:uppercase}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(212,168,67,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-loading{opacity:.6;pointer-events:none;cursor:default}
</style>
</head>
<body>
<div class="app">
  <header><h1>LOL</h1><p>Champion Draft Predictor</p></header>
  <div class="board">
    <div class="team-col blue">
      <div class="team-label blue">Blue Team</div>
      <div class="frames" id="blue-frames"></div>
    </div>
    <div class="center">
      <div class="vs">VS</div>
      <div class="winbar-wrap">
        <div class="winbar-pcts"><span class="b" id="bpct">50%</span><span class="r" id="rpct">50%</span></div>
        <div class="winbar"><div class="winbar-fill" id="wbar"></div></div>
      </div>
      <div class="draft-info" id="draft-info">Pick 1 of 10 — Blue Team</div>
      <div class="role-wrap">
        <label>Role for this pick</label>
        <select class="role-sel" id="cur-role">
          <option value="">★ Any Role</option>
          <option value="top">Top</option>
          <option value="jungle">Jungle</option>
          <option value="mid">Mid</option>
          <option value="bot">Bot</option>
          <option value="support">Support</option>
        </select>
      </div>
      <button class="btn btn-add" onclick="openModal()">+ Add Champion</button>
      <button class="btn btn-predict" onclick="predict()">Predict Best Pick</button>
      <div class="reco" id="reco">
        <div class="reco-header">
          <span class="reco-title" id="reco-title">Best Picks</span>
          <button class="reco-close" onclick="closeReco()">×</button>
        </div>
        <div class="reco-list" id="reco-list"></div>
      </div>
      <button class="btn btn-reset" onclick="resetAll()" style="flex-shrink:0;margin-top:auto">Reset Draft</button>
    </div>
    <div class="team-col red">
      <div class="team-label red">Red Team</div>
      <div class="frames" id="red-frames"></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-head-title" id="modal-title">Pick a Champion</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <input class="search" id="search" placeholder="Search champion…" oninput="filterGrid()"/>
    <div class="champ-grid" id="champ-grid"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API="https://machine-learning-spring-2026-final.onrender.com";
const DD="https://ddragon.leagueoflegends.com/cdn/15.8.1/img/champion";
const DRAFT_ORDER=[['blue',0],['red',0],['red',1],['blue',1],['blue',2],['red',2],['red',3],['blue',3],['blue',4],['red',4]];

const ROLE_POOL={
  top:['Aatrox','Camille','Darius','Fiora','Gangplank','Garen','Gnar','Gragas','Gwen','Illaoi','Irelia','Jax','Jayce','Kayle','Kennen','Kled','Malphite','Maokai','Mordekaiser','Nasus','Ornn','Pantheon','Poppy','Quinn','Renekton','Riven','Rumble','Sett','Shen','Shyvana','Singed','Sion','Teemo','Tryndamere','Urgot','Vayne','Vladimir','Volibear','Warwick','Yorick','Ambessa','KSante','Olaf'],
  jungle:['Amumu','Belveth','Briar','Darius','Diana','Ekko','Elise','Evelynn','Fiddlesticks','Gragas','Graves','Hecarim','Ivern','JarvanIV','Kayn','Khazix','Kindred','Kled','LeeSin','Lillia','MasterYi','MonkeyKing','Mordekaiser','Nidalee','Nocturne','Nunu','Olaf','Pantheon','Poppy','Rammus','RekSai','Rengar','Sejuani','Shaco','Shyvana','Skarner','Sylas','Taliyah','Trundle','Udyr','Vi','Viego','Volibear','Warwick','XinZhao','Zac'],
  mid:['Ahri','Akali','Akshan','Anivia','Annie','AurelionSol','Aurora','Azir','Cassiopeia','Corki','Diana','Ekko','Fizz','Galio','Gragas','Hwei','Irelia','Jayce','Kassadin','Katarina','Leblanc','Lissandra','Lux','Malzahar','Naafiri','Neeko','Orianna','Pantheon','Qiyana','Ryze','Sylas','Syndra','Taliyah','Talon','TwistedFate','Veigar','Vex','Viktor','Vladimir','Xerath','Yasuo','Yone','Zed','Ziggs','Zoe','Mel'],
  bot:['Aphelios','Ashe','Caitlyn','Corki','Draven','Ezreal','Jhin','Jinx','Kaisa','Kalista','KogMaw','Lucian','MissFortune','Nilah','Quinn','Samira','Senna','Sivir','Smolder','Tristana','Twitch','Varus','Vayne','Xayah','Yasuo','Yone','Zeri','Ziggs'],
  support:['Alistar','Bard','Blitzcrank','Brand','Braum','Janna','Karma','Lulu','Lux','Maokai','Milio','Morgana','Nami','Nautilus','Neeko','Pyke','Rakan','Rell','Renata','Senna','Seraphine','Shaco','Sona','Soraka','Swain','TahmKench','Taric','Thresh','Velkoz','Xerath','Yuumi','Zilean','Zyra','Zoe','Leona','Galio','Heimerdinger'],
};

const DD_KEY={AurelionSol:'AurelionSol',Belveth:'Belveth',Chogath:'Chogath',DrMundo:'DrMundo',JarvanIV:'JarvanIV',Kaisa:'Kaisa',KSante:'KSante',Khazix:'Khazix',KogMaw:'KogMaw',LeeSin:'LeeSin',MasterYi:'MasterYi',Mel:'Mel',MissFortune:'MissFortune',MonkeyKing:'MonkeyKing',Naafiri:'Naafiri',RekSai:'RekSai',TahmKench:'TahmKench',TwistedFate:'TwistedFate',Velkoz:'Velkoz',XinZhao:'XinZhao',Yunara:'Yunara',Zaahen:'Zaahen',Aurora:'Aurora',Ambessa:'Ambessa',Hwei:'Hwei',Smolder:'Smolder',Nilah:'Nilah',Briar:'Briar',Milio:'Milio'};
function ddImg(n){return `${DD}/${DD_KEY[n]||n}.png`;}

const DISPLAY={AurelionSol:'Aurelion Sol',Belveth:"Bel'Veth",Chogath:"Cho'Gath",DrMundo:'Dr. Mundo',JarvanIV:'Jarvan IV',KSante:"K'Sante",Khazix:"Kha'Zix",KogMaw:"Kog'Maw",LeeSin:'Lee Sin',MasterYi:'Master Yi',MissFortune:'Miss Fortune',MonkeyKing:'Wukong',RekSai:"Rek'Sai",TahmKench:'Tahm Kench',TwistedFate:'Twisted Fate',Velkoz:"Vel'Koz",XinZhao:'Xin Zhao'};
function display(n){return DISPLAY[n]||n;}

let allChampions=[];
let slots={blue:Array(5).fill(null),red:Array(5).fill(null)};
let pickIndex=0;

async function init(){
  toast('Connecting to server…');
  for(let attempt=1;attempt<=10;attempt++){
    try{
      const r=await fetch(`${API}/champions`);
      if(!r.ok) throw new Error('bad');
      allChampions=(await r.json()).champions.sort((a,b)=>display(a).localeCompare(display(b)));
      toast('Ready!');
      setTimeout(()=>document.getElementById('toast').classList.remove('show'),1200);
      break;
    }catch(e){
      if(attempt<10){
        toast(`Waking up server… (${attempt}/10)`);
        await new Promise(res=>setTimeout(res,6000));
      } else {
        toast('Server unavailable — please refresh');
      }
    }
  }
  render();
}

function currentRole(){return document.getElementById('cur-role').value;}
function render(){renderTeam('blue');renderTeam('red');updateDraftInfo();}

function renderTeam(team){
  const container=document.getElementById(`${team}-frames`);
  container.innerHTML='';
  for(let i=0;i<5;i++){
    const champ=slots[team][i];
    const orderIdx=DRAFT_ORDER.findIndex(([t,s])=>t===team&&s===i);
    const isActive=pickIndex<10&&DRAFT_ORDER[pickIndex][0]===team&&DRAFT_ORDER[pickIndex][1]===i;
    const frame=document.createElement('div');
    frame.className='champ-frame'+(champ?' filled':'')+(isActive?' active':'');
    const badge=document.createElement('div');badge.className='pick-badge';badge.textContent=`#${orderIdx+1}`;
    frame.appendChild(badge);
    const pic=document.createElement('div');pic.className='frame-img';
    if(champ){const im=document.createElement('img');im.src=ddImg(champ);im.onerror=()=>{im.style.display='none';pic.textContent='?';};pic.appendChild(im);}
    else{pic.textContent='?';}
    frame.appendChild(pic);
    const nm=document.createElement('div');nm.className='frame-name'+(champ?'':' empty');
    nm.textContent=champ?display(champ):(isActive?'Picking…':'—');
    frame.appendChild(nm);
    container.appendChild(frame);
  }
}

function updateDraftInfo(){
  const el=document.getElementById('draft-info');
  if(pickIndex>=10){el.textContent='Draft complete!';return;}
  const[team]=DRAFT_ORDER[pickIndex];
  el.textContent=`Pick ${pickIndex+1} of 10 — ${team==='blue'?'Blue':'Red'} Team`;
}

function openModal(){
  if(pickIndex>=10){toast('Draft complete — reset to start over');return;}
  const[team]=DRAFT_ORDER[pickIndex];
  const role=currentRole();
  document.getElementById('modal-title').textContent=`Pick ${pickIndex+1} — ${team==='blue'?'Blue':'Red'}${role?' · '+role.charAt(0).toUpperCase()+role.slice(1):''}`;
  document.getElementById('search').value='';
  buildGrid(role&&ROLE_POOL[role]?ROLE_POOL[role]:null);
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

function buildGrid(pool){
  const used=new Set([...slots.blue,...slots.red].filter(Boolean));
  const source=pool?allChampions.filter(n=>pool.includes(n)):allChampions;
  const grid=document.getElementById('champ-grid');grid.innerHTML='';
  source.forEach(name=>{
    const card=document.createElement('div');
    card.className='champ-card'+(used.has(name)?' used':'');
    card.dataset.n=display(name).toLowerCase();
    const im=document.createElement('img');im.src=ddImg(name);im.onerror=()=>{im.style.display='none';};
    const sp=document.createElement('span');sp.textContent=display(name);
    card.appendChild(im);card.appendChild(sp);
    card.onclick=()=>pick(name);
    grid.appendChild(card);
  });
}
function filterGrid(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.champ-card').forEach(c=>c.style.display=c.dataset.n.includes(q)?'':'none');
}

function pick(name){
  if(pickIndex>=10)return;
  const[team,idx]=DRAFT_ORDER[pickIndex];
  slots[team][idx]=name;
  closeModal();
  closeReco();
  pickIndex++;
  while(pickIndex<10){const[t,i]=DRAFT_ORDER[pickIndex];if(!slots[t][i])break;pickIndex++;}
  document.getElementById('cur-role').value='';
  render();updateWinProb();
}

async function predict(){
  if(pickIndex>=10){toast('Draft complete — reset to start over');return;}
  const[team,idx]=DRAFT_ORDER[pickIndex];
  const role=currentRole()||null;
  const btn=document.querySelector('.btn-predict');
  btn.innerHTML='<span class="spinner"></span>Predicting…';
  btn.classList.add('btn-loading');
  try{
    const resp=await fetch(`${API}/predict`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        blue_team:slots.blue.filter(Boolean),
        red_team:slots.red.filter(Boolean),
        team, role,
        top_n: 0
      })
    });
    if(!resp.ok){toast('Error '+resp.status);return;}
    const d=await resp.json();
    if(!d.recommendations||!d.recommendations.length){toast('No recommendations returned');return;}
    showReco(d.recommendations,team,idx,role);
  }catch(e){toast('API unreachable — wait 30s and retry');}
  finally{
    btn.innerHTML='Predict Best Pick';
    btn.classList.remove('btn-loading');
  }
}

function showReco(recs,team,idx,role){
  const panel=document.getElementById('reco');
  const list=document.getElementById('reco-list');
  const roleLabel=role?` · ${role.charAt(0).toUpperCase()+role.slice(1)}`:' · All Roles';
  document.getElementById('reco-title').textContent=`Best Picks — ${team==='blue'?'Blue':'Red'}${roleLabel}`;
  list.innerHTML='';
  recs.forEach((r,i)=>{
    const item=document.createElement('div');item.className='reco-item';
    const rank=document.createElement('span');rank.className='reco-rank';rank.textContent=i+1;
    const im=document.createElement('img');im.className='reco-img';im.src=ddImg(r.champion);im.onerror=()=>im.src='';
    const nm=document.createElement('span');nm.className='reco-name';nm.textContent=display(r.champion);
    const pb=document.createElement('span');pb.className='reco-prob';pb.textContent=(r.win_prob*100).toFixed(1)+'%';
    item.appendChild(rank);item.appendChild(im);item.appendChild(nm);item.appendChild(pb);
    item.onclick=()=>pick(r.champion);
    list.appendChild(item);
  });
  panel.classList.add('visible');
}

function closeReco(){
  document.getElementById('reco').classList.remove('visible');
}

async function updateWinProb(){
  const b=slots.blue.filter(Boolean),re=slots.red.filter(Boolean);
  if(!b.length&&!re.length){setBar(0.5);return;}
  try{
    const r=await fetch(`${API}/winprob`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({blue_team:b,red_team:re})});
    const d=await r.json();setBar(d.blue_win_prob);
  }catch(e){}
}
function setBar(p){
  document.getElementById('wbar').style.width=(p*100)+'%';
  document.getElementById('bpct').textContent=(p*100).toFixed(1)+'%';
  document.getElementById('rpct').textContent=((1-p)*100).toFixed(1)+'%';
}

function resetAll(){
  slots={blue:Array(5).fill(null),red:Array(5).fill(null)};
  pickIndex=0;document.getElementById('cur-role').value='';
  closeReco();render();setBar(0.5);
}

let tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),5000);}

// ping Render every 4 min to prevent sleep
setInterval(()=>fetch(API+'/health').catch(()=>{}), 240000);
init();
</script>
</body>
</html>
